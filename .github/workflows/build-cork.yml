name: 手动构建 Cork 应用（macOS 未签名，仅私用）

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    name: 编译 Cork 项目并生成 DMG（仅个人使用）

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 使用 Xcode 16.4（包含 macOS 15 SDK / SF Symbols 6）
      - name: 选择 Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: 打印 Xcode 版本
        run: xcodebuild -version

      # 跳过 SPM 插件/宏指纹校验（CI 必备）
      - name: 允许 CI 信任 SPM 插件与宏（跳过指纹校验）
        run: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      # 缓存（Mise / Tuist / Homebrew），提速
      - name: 恢复缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/mise
            ~/.tuist
            ~/Library/Caches/Homebrew
          key: cork-cache-${{ runner.os }}-${{ hashFiles('**/Tuist.swift', '**/.mise.toml') }}
          restore-keys: |
            cork-cache-${{ runner.os }}-

      - name: 安装 Mise
        run: |
          curl -fsSL https://mise.run | sh || true
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 生成 Xcode 工程（Tuist）
        run: |
          ~/.local/bin/mise install tuist@4.50.2
          ~/.local/bin/mise exec tuist@4.50.2 -- tuist install
          ~/.local/bin/mise exec tuist@4.50.2 -- tuist generate --no-binary-cache

      # 列出 schemes，确认含有 “Self-Compiled”
      - name: 列出可用 schemes
        run: |
          xcodebuild -workspace Cork.xcworkspace -list | tee schemes.txt

      # 在 workspace 上解析依赖（跳过插件/宏校验）
      - name: 解析包依赖（SPM）
        run: |
          set -o pipefail
          xcodebuild \
            -workspace Cork.xcworkspace \
            -scheme "Self-Compiled" \
            -resolvePackageDependencies \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            | tee resolve.log

      # ✅ 关键：用 Self-Compiled scheme，并把语言/并发模式钉到与上游一致的配置
      - name: 编译 Cork 应用（Self-Compiled）
        run: |
          set -o pipefail
          echo "开始编译（Self-Compiled / Release）..."
          xcodebuild \
            -workspace Cork.xcworkspace \
            -scheme "Self-Compiled" \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            SWIFT_VERSION=5.0 \
            SWIFT_STRICT_CONCURRENCY=targeted \
            MACOSX_DEPLOYMENT_TARGET=13.0 \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=- \
            | tee build.log
          echo "✅ 编译阶段结束（失败请看 build.log / resolve.log）"

      - name: 查看构建产物目录
        run: |
          echo "构建目录内容如下："
          ls -R build/Build/Products || true
          ls -R build/Build/Products/Release || true

      - name: 打包 Cork.app 为 ZIP
        run: |
          APP_PATH="build/Build/Products/Release/Cork.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 未找到 ${APP_PATH}，请先查看 schemes.txt / resolve.log / build.log，确认 scheme=Self-Compiled 成功构建。"
            exit 1
          fi
          ditto -c -k --keepParent "$APP_PATH" Cork-Release.zip

      - name: 生成未签名 DMG
        run: |
          APP_PATH="build/Build/Products/Release/Cork.app"
          STAGING="dmg_stage"
          DMG_NAME="Cork-Release-unsigned.dmg"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          hdiutil create -volname "Cork" -srcfolder "$STAGING" -ov -format UDZO "$DMG_NAME"

      - name: 上传构建产物（私密 Artifacts）
        uses: actions/upload-artifact@v4
        with:
          name: Cork-macOS-unsigned
          path: |
            Cork-Release.zip
            Cork-Release-unsigned.dmg
            schemes.txt
            resolve.log
            build.log
          if-no-files-found: error
          retention-days: 7
