name: 手动构建 Cork 应用（macOS 未签名，仅私用）

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    name: 编译 Cork 项目并生成 DMG（仅个人使用）

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 选择 Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: 打印 Xcode 版本
        run: xcodebuild -version

      - name: 允许 CI 信任 SPM 插件与宏（跳过指纹校验）
        run: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: 恢复缓存（Mise / Tuist / Homebrew）
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/mise
            ~/.tuist
            ~/Library/Caches/Homebrew
          key: cork-cache-${{ runner.os }}-${{ hashFiles('**/Tuist.swift', '**/.mise.toml') }}
          restore-keys: |
            cork-cache-${{ runner.os }}-

      - name: 安装 Mise
        run: |
          curl -fsSL https://mise.run | sh || true
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 生成 Xcode 工程（Tuist）
        run: |
          ~/.local/bin/mise install tuist@4.50.2
          ~/.local/bin/mise exec tuist@4.50.2 -- tuist install
          ~/.local/bin/mise exec tuist@4.50.2 -- tuist generate --no-binary-cache

      # 👇 列出 workspace 里的 scheme，确认有哪些（关键排查信息）
      - name: 列出可用 schemes
        run: |
          xcodebuild -workspace Cork.xcworkspace -list | tee schemes.txt

      - name: 解析包依赖（SPM）
        run: |
          set -o pipefail
          xcodebuild \
            -workspace Cork.xcworkspace \
            -scheme Cork \
            -resolvePackageDependencies \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            | tee resolve.log

      # ⚠️ 与上游一致：用 Tuist 驱动构建“Cork”这个 scheme（不是 Self-Compiled）
      - name: 编译 Cork 应用（Tuist build -> scheme=Cork）
        run: |
          set -o pipefail
          echo "开始编译（tuist build Cork -c Release）..."
          ~/.local/bin/mise exec tuist@4.50.2 -- tuist build Cork -c Release -- \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=-
          echo "✅ 编译结束"

      - name: 查看构建产物目录
        run: |
          echo "构建目录内容如下："
          ls -R build/Build/Products || true
          ls -R build/Build/Products/Release || true

      - name: 打包 Cork.app 为 ZIP
        run: |
          APP_PATH="build/Build/Products/Release/Cork.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 未找到 ${APP_PATH}。请先查看 schemes.txt / resolve.log / build.log，确认使用的 scheme 是否正确（推荐：Cork）。"
            exit 1
          fi
          ditto -c -k --keepParent "$APP_PATH" Cork-Release.zip
          echo "✅ ZIP 打包完成"

      - name: 生成未签名 DMG
        run: |
          APP_PATH="build/Build/Products/Release/Cork.app"
          STAGING="dmg_stage"
          DMG_NAME="Cork-Release-unsigned.dmg"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          hdiutil create -volname "Cork" -srcfolder "$STAGING" -ov -format UDZO "$DMG_NAME"
          echo "✅ DMG 打包完成"

      - name: 上传构建产物（私密 Artifacts）
        uses: actions/upload-artifact@v4
        with:
          name: Cork-macOS-unsigned
          path: |
            Cork-Release.zip
            Cork-Release-unsigned.dmg
            schemes.txt
            resolve.log
          if-no-files-found: error
          retention-days: 7
