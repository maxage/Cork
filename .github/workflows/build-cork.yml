name: 编译 Cork（本地私用，未签名 DMG）

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    env:
      # ★ 关键：把最低系统提高到 15.0，解决 SwiftUI API 兼容性问题
      MACOSX_DEPLOYMENT_TARGET: "15.0"
      DEVELOPER_DIR: /Applications/Xcode_17.0.app/Contents/Developer
      MD_APPLE_SDK_ROOT: /Applications/Xcode_17.0.app

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 选择 Xcode 17.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '17.0'

      - name: 打印 Xcode 版本
        run: xcodebuild -version

      - name: 跳过 SPM 插件/宏指纹校验
        run: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: 缓存（mise / tuist / brew）
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/mise
            ~/.tuist
            ~/Library/Caches/Homebrew
          key: cork-cache-${{ runner.os }}-${{ hashFiles('**/Tuist.swift', '**/.mise.toml') }}
          restore-keys: |
            cork-cache-${{ runner.os }}-

      - name: 安装 mise
        run: |
          curl -fsSL https://mise.run | sh || true
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 安装/生成 Tuist 工程
        run: |
          ~/.local/bin/mise install tuist@4.50.2
          ~/.local/bin/mise exec tuist@4.50.2 -- tuist install
          ~/.local/bin/mise exec tuist@4.50.2 -- tuist generate --no-binary-cache

      - name: 列出 schemes
        run: xcodebuild -workspace Cork.xcworkspace -list | tee schemes.txt

      - name: 解析包依赖
        run: |
          set -o pipefail
          xcodebuild \
            -workspace Cork.xcworkspace \
            -scheme "Self-Compiled" \
            -resolvePackageDependencies \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            | tee resolve.log

      - name: 编译（Release，未签名）
        run: |
          set -o pipefail
          echo "开始编译（Self-Compiled / Release / macOS ${MACOSX_DEPLOYMENT_TARGET}）..."
          xcodebuild \
            -workspace Cork.xcworkspace \
            -scheme "Self-Compiled" \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            MACOSX_DEPLOYMENT_TARGET=${MACOSX_DEPLOYMENT_TARGET} \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=- \
            | tee build.log
          echo "✅ 编译结束"

      - name: 检查构建产物
        run: |
          APP="build/Build/Products/Release/Cork.app"
          if [ ! -d "$APP" ]; then
            echo "❌ 没找到 $APP"
            ls -R build/Build/Products || true
            exit 1
          fi
          echo "✅ 找到：$APP"

      - name: 生成未签名 DMG
        run: |
          APP="build/Build/Products/Release/Cork.app"
          OUT="Cork-unsigned.dmg"
          mkdir -p dist
          hdiutil create -volname "Cork" -srcfolder "$APP" -ov -format UDZO "dist/$OUT"
          echo "✅ DMG：dist/$OUT"

      - name: 上传私密工件
        uses: actions/upload-artifact@v4
        with:
          name: cork-unsigned-dmg
          path: |
            dist/Cork-unsigned.dmg
            schemes.txt
            resolve.log
            build.log
          if-no-files-found: error
