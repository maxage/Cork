name: 编译 Cork 项目并生成 DMG（仅个人使用）

on:
  workflow_dispatch: {}   # 仅手动触发

permissions:
  contents: read

jobs:
  build:
    name: Build Cork (Swift 6 + macOS 15 SDK)
    runs-on: macos-15
    env:
      # 关键：部署目标≥14，匹配项目里用到的 SwiftData 等 API
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      # 关键：选用 Xcode 16.4（含 macOS 15.5 SDK）
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
      # 让 SPM 插件（如 SwiftLint 插件）在 CI 环境下可用
      SKIP_PACKAGE_PLUGIN_VALIDATION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装 mise（用于装 tuist）
        run: |
          curl -fsSL https://mise.run | sh || true
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 安装 tuist
        run: |
          ~/.local/bin/mise plugins install tuist || true
          ~/.local/bin/mise use -g tuist@latest
          tuist version

      - name: 选择 Xcode 16.4
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app

      - name: 允许使用包插件（SwiftLint 等）
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: 准备 Tuist 工程（不改源码）
        run: |
          tuist install
          tuist fetch
          tuist generate --no-open

      - name: 用 Swift 6 编译 Cork（Self-Compiled Scheme）
        run: |
          set -o pipefail
          xcodebuild \
            -project Cork.xcodeproj \
            -scheme "Self-Compiled" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=- \
            SWIFT_VERSION=6.0 \
            | tee build.log | xcpretty
          echo "✅ 编译完成"

      - name: 检查构建产物目录
        run: |
          echo "构建目录内容如下："
          ls -la build/Build/Products/Release || true

      - name: 组装 Cork.app 路径
        id: paths
        run: |
          APP_PATH="build/Build/Products/Release/Cork.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 未找到 Cork.app，编译失败！"; exit 1
          fi
          echo "app=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: 打包 Cork.app 为 ZIP（便于下载）
        run: |
          ditto -c -k --sequesterRsrc --keepParent "${{ steps.paths.outputs.app }}" "Cork.app.zip"
          ls -la "Cork.app.zip"

      - name: 生成未签名 DMG（仅个人使用）
        run: |
          mkdir -p dmg_root
          cp -R "${{ steps.paths.outputs.app }}" dmg_root/
          hdiutil create -volname "Cork" -srcfolder dmg_root -ov -format UDZO "Cork-unsigned.dmg"
          ls -la "Cork-unsigned.dmg"

      - name: 上传构建产物（私密 Artifacts）
        uses: actions/upload-artifact@v4
        with:
          name: Cork-macOS-unsigned
          path: |
            build.log
            Cork.app.zip
            Cork-unsigned.dmg
          retention-days: 7
